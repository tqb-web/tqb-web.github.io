<script type="text/javascript">
    var {
        Query
    } = AV;
    AV.init({
        appId: "9Oqhp0JEHEehYu92GIBgVKeE-MdYXbMMI",
        appKey: "H5H7n5KHUqMOSRv5VSQ95qgi",
        serverURLs: 'https://9Oqhp0JE.api.lncldglobal.com'
    });
 
    var query = new AV.Query('content');
 
    var app = new Vue({
        el: '#app',
        data: {
            page: 0,
            count: 0,
            contents: []
        },
        methods: {
            loadMore: function (event) {
                getData(++this.page);
            }
        }
    })
 
    function urlToLink(str) {
        //增加发图片功能
        var re = /\bhttps?:\/\/(?!\S+(?:jpe?g|png|bmp|gif|webp|gif))\S+/g;
        var re_forpic = /\bhttps?:\/\/.*?(\.gif|\.jpeg|\.png|\.jpg|\.bmp|\.webp)/g;
        str = str.replace(re, function (website) {
            return "<a href='" + website + "' target='_blank'> <i class='iconfont icon-lianjie-copy'></i>链接 </a>";
        });
        str = str.replace(re_forpic, function (imgurl) {
            return "<img src='" + imgurl + "'  /> ";
        });
        return str;
    }
    //友好地显示时间
    function timeago(dateTimeStamp) {
        var minute = 1000 * 60; //把分，时，天，周，半个月，一个月用毫秒表示 
        var hour = minute * 60;
        var day = hour * 24;
        var week = day * 7;
        var month = day * 30;
        var now = new Date().getTime(); //获取当前时间毫秒 
        var diffValue = now - dateTimeStamp; //时间差 
        if (diffValue < 0) {
            return;
        }
        var minC = diffValue / minute; //计算时间差的分，时，天，周，月 
        var hourC = diffValue / hour;
        var dayC = diffValue / day;
        var weekC = diffValue / week;
        var monthC = diffValue / month;
        if (monthC >= 1 && monthC <= 3) {
            result = " " + parseInt(monthC) + " 月前"
        } else if (weekC >= 1 && weekC <= 3) {
            result = " " + parseInt(weekC) + " 周前"
        } else if (dayC >= 1 && dayC <= 6) {
            result = " " + parseInt(dayC) + " 天前"
        } else if (hourC >= 1 && hourC <= 23) {
            result = " " + parseInt(hourC) + " 小时前"
        } else if (minC >= 1 && minC <= 59) {
            result = " " + parseInt(minC) + " 分钟前"
        } else if (diffValue >= 0 && diffValue <= minute) {
            result = "刚刚"
        } else {
            var datetime = new Date();
            datetime.setTime(dateTimeStamp);
            var Nmonth = datetime.getMonth() + 1 < 10 ? "0" + (datetime.getMonth() + 1) : datetime.getMonth() + 1;
            var Ndate = datetime.getDate() < 10 ? "0" + datetime.getDate() : datetime.getDate();
            result = Nmonth + "-" + Ndate
        }
        return result;
    }
    function getData(page = 0) {
        query.descending('createdAt').skip(page * 10).limit(10).find().then(function (results) {
            if (results.length == 0) {
                alert('之前没发表过说说了')
            } else {
                let resC = results;
                reqData = false;
                resC.forEach((i) => {
                    let dateTmp = new Date(i.createdAt);
                    i.attributes.time = timeago(dateTmp);
                    i.attributes.content = urlToLink(i.attributes.content);
                    app.contents.push(i);
                })
            }
 
        }, function (error) { });
    }
 
    getData(0);
 
    query.count().then(function (count) {
        app.count = count;
    }, function (error) { });
 
 
</script>

  <script>
var pjax = new Pjax({
  selectors: [
    'head title',
    '#page-configurations',
    '.content-wrap',
    '.post-toc-wrap',
    '.languages',
    '#pjax'
  ],
  switches: {
    '.post-toc-wrap': Pjax.switches.innerHTML
  },
  analytics: false,
  cacheBust: false,
  scrollTo : !CONFIG.bookmark.enable
});

window.addEventListener('pjax:success', () => {
  document.querySelectorAll('script[data-pjax], script#page-configurations, #pjax script').forEach(element => {
    var code = element.text || element.textContent || element.innerHTML || '';
    var parent = element.parentNode;
    parent.removeChild(element);
    var script = document.createElement('script');
    if (element.id) {
      script.id = element.id;
    }
    if (element.className) {
      script.className = element.className;
    }
    if (element.type) {
      script.type = element.type;
    }
    if (element.src) {
      script.src = element.src;
      // Force synchronous loading of peripheral JS.
      script.async = false;
    }
    if (element.dataset.pjax !== undefined) {
      script.dataset.pjax = '';
    }
    if (code !== '') {
      script.appendChild(document.createTextNode(code));
    }
    parent.appendChild(script);
  });
  NexT.boot.refresh();
  // Define Motion Sequence & Bootstrap Motion.
  if (CONFIG.motion.enable) {
    NexT.motion.integrator
      .init()
      .add(NexT.motion.middleWares.subMenu)
      .add(NexT.motion.middleWares.postList)
      .bootstrap();
  }
  NexT.utils.updateSidebarPosition();
});

</script>
